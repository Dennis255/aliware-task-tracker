# --- Base de Datos (PostgreSQL) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=aliware_user
quarkus.datasource.password=aliware_password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/tasktracker_db

# --- Hibernate ---
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# --- Migraciones ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# --- Seguridad JWT ---
quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.issuer=https://aliware.com/issuer
mp.jwt.verify.publickey.location=classpath:publicKey.pem
smallrye.jwt.sign.key.location=classpath:privateKey.pem

# --- CORS ---
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173   # <- origen exacto del frontend
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.access-control-allow-credentials=true